server.port=8080
# Bind to all network interfaces (allows access from other devices)
server.address=0.0.0.0
spring.application.name=MusicSync

# WebSocket
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# YouTube source uses web metadata fallback by default.
# Optional: set YOUTUBE_API_KEY to use official YouTube Data API v3 for better reliability.
youtube.api-key=${YOUTUBE_API_KEY:}
