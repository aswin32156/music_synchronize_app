services:
  - type: web
    name: musicsync
    runtime: docker
    plan: free
    region: oregon
    branch: master
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JAVA_OPTS
        value: "-Xmx512m"
      - key: SERVER_PORT
        value: "8080"
      - key: YOUTUBE_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
