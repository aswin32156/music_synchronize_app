server.port=8080
# Bind to all network interfaces (allows access from other devices)
server.address=0.0.0.0
spring.application.name=MusicSync

# Forward headers from reverse proxy (required for Render.com/Heroku/etc)
server.forward-headers-strategy=native

# WebSocket
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# Spotify API (optional - get credentials at https://developer.spotify.com/dashboard)
# Provides 30-second preview clips for international songs
spotify.client-id=
spotify.client-secret=
