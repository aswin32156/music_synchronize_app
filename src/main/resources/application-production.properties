# Production-specific configuration for deployed environments (Render, Heroku, etc.)

# Server configuration for cloud deployment
server.port=${PORT:8080}
server.address=0.0.0.0

# Forward headers from reverse proxy (CRITICAL for WebSocket on HTTPS)
server.forward-headers-strategy=native

# WebSocket configuration for production
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# Logging
logging.level.root=INFO
logging.level.com.musicsync=DEBUG
logging.level.org.springframework.web.socket=DEBUG
